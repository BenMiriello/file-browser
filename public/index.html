<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debian File Browser</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Debian File Browser</h1>
            <div class="path-input-container">
                <input type="text" id="current-path">
                <button id="parent-dir"><i class="fas fa-level-up-alt"></i></button>
            </div>
            <div class="path-buttons">
                <button id="home-dir"><i class="fas fa-home"></i> Home</button>
                <button id="refresh"><i class="fas fa-sync-alt"></i></button>
                <button id="toggle-hidden"><i class="fas fa-eye-slash"></i> .files</button>
            </div>
        </header>
        
        <main class="main-content">
            <div class="file-list-container">
                <div class="file-list-wrapper">
                    <table class="file-list">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Size</th>
                                <th>Modified</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="file-list-body">
                            <!-- File list will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
        
        <div class="overlay" id="loading-overlay">
            <div class="spinner"></div>
        </div>
        
        <div class="modal" id="preview-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="preview-filename">File Preview</h3>
                    <button class="close-modal" id="close-preview">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="file-preview-content" id="file-preview-content">
                        <div class="preview-placeholder">
                            <i class="fas fa-file-alt"></i>
                            <p>Loading preview...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
